<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login do Dashboard</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .card-login {
            background: #ffffff;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 14px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 380px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="card-login text-center">
    <h4 class="mb-3">🔒 Acesso ao Dashboard</h4>

    {% if erro %}
        <div class="alert alert-danger py-2">{{ erro }}</div>
    {% endif %}

    <form method="POST">
        <input type="password"
               name="senha"
               class="form-control mb-3"
               placeholder="Digite a senha do gerente"
               required>
        <button class="btn btn-dark w-100">Entrar</button>
    </form>
</div>

</body>
</html>
